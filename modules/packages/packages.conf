# packages.conf -- Package registry (single source of truth)
# Adding/removing a package = editing this file. No code changes needed.
#
# Section conventions:
#   [name]             always-installed RPM packages
#   [name:qualifier]   RPM packages gated by profile key packages.<qualifier>
#   [name:gtk]         RPM packages only when desktop_toolkit = gtk
#   [name:qt]          RPM packages only when desktop_toolkit = qt
#   [flatpak:name]     Flatpak apps (installed when packages.flatpak = true)
#
# Special section:
#   [sway-extra]       installed only on non-Sway-Spin systems

